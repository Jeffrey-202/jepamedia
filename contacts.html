<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact</title>
    <meta name="description" content="JEPA MEDIA - Your gateway to stunning digital art AND DESIGN" />
    <link href="https://fonts.googleapis.com/css2?family=Bungee&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="assets/css/style.css" rel="stylesheet" type="text/css">
</head>
<body>
<header class="site-header">
    <a href="index.html" class="header-logo-link" aria-label="Jepa Media home">
        <img src="assets/images/logojepa.png" alt="Jepa Media logo" class="header-logo">
    </a>
    <h1 class="site-title">jepa media</h1>
    <a href="index.html" class="home-icon-link" aria-label="Home">
        <img src="assets/images/jepahome.png"Home" class="home-icon-img">
    </a>
</header>

<main class="page-content">
    <h1 id="main-header">CONTACTS</h1>
    <h2 class="contact-subheader">Send a message</h2>
    <p class="contact-header">fill out the form below to get in touch</p>

    <div class="contactform-container">
      <form action="https://formspree.io/f/xkokjrrw" method="POST" class="contact-form">
        <input type="text" name="firstName" placeholder="First name" autocomplete="off" required>
        
        <input type="text" name="lastName" placeholder="Last name" autocomplete="off" required>
        
        <input type="email" name="email" placeholder="Email" autocomplete="off" required>
        
        <textarea name="message" rows="5" cols="60" placeholder="Enter text" required></textarea>
        
        <button type="submit">Send message</button>
      </form>
    </div>
</main>

<footer class="site-footer">

    <a href="https://www.facebook.com/jepa.media/" target="_blank"><i class="fab fa-facebook"></i></a>
    </p>
</footer>
</body>
</html>
